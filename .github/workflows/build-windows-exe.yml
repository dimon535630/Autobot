name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller keyboard opencv-python numpy pyautogui pydirectinput pygame pillow

      - name: Build launcher.exe (onedir)
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --windowed --name launcher `
            --icon Fishing.ico `
            --add-data "ASK.mp3;." `
            --add-data "knopkasebe.jpg;." `
            --add-data "otpustit.png;." `
            --add-data "1.png;." `
            --add-data "q11.png;." `
            --add-data "q12.png;." `
            --add-data "stop.png;." `
            --add-data "EZEFISH.jpg;." `
            --add-data "config.json;." `
            --add-data "licenses.db;." `
            launcher.py

      - name: Archive build output
        shell: pwsh
        run: |
          Compress-Archive -Path dist/launcher/* -DestinationPath dist/launcher-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: launcher-windows
          path: dist/launcher-windows.zip
